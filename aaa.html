<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>guest@portfolio: ~</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --term-bg: #300a24;
    --term-bg-titlebar: #3c1a30;
    --term-text: #ffffff;
    --term-purple: #c694ff;
    --term-orange: #ff8a3d;
    --term-green: #8ae234;
    --term-cyan: #5bc8e0;
    --term-red: #ef4444;
    --term-dim: #b8a6c4;
    --term-cursor: #ffffff;
    --scrollbar-thumb: #5e3a52;
    --font-mono: "Ubuntu Mono", "DejaVu Sans Mono", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
  }

  /* subtle desktop backdrop so the window reads as a window */
  .desktop {
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at top left, #4b1f3d 0%, #1a0f17 55%, #0d0a0c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .terminal-window {
    position: relative;
    width: min(980px, 100%);
    height: min(640px, 92vh);
    background: var(--term-bg);
    border-radius: 6px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .titlebar {
    background: var(--term-bg-titlebar);
    height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 10px;
    -webkit-user-select: none;
    user-select: none;
    border-bottom: 1px solid rgba(0,0,0,0.3);
  }

  .titlebar-left {
    display: flex;
    align-items: center;
    min-width: 44px;
  }

  .tb-new-tab {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--term-dim);
    border-radius: 4px;
    cursor: default;
  }

  .tb-new-tab svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
  }

  .titlebar-title {
    flex: 1;
    text-align: center;
    color: var(--term-dim);
    font-size: 13px;
    font-family: "Ubuntu", var(--font-mono);
  }

  .titlebar-right {
    display: flex;
    align-items: center;
  }

  .tb-btn {
    width: 34px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--term-dim);
    cursor: default;
    background: transparent;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.08); }
  .tb-btn.tb-close:hover { background: #c0392b; color: #fff; }

  .tb-btn svg {
    width: 15px;
    height: 15px;
    stroke: currentColor;
    stroke-width: 1.6;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tb-menu {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--term-dim);
    margin-right: 6px;
    cursor: default;
  }
  .tb-menu svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
  }

  .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 12px 12px;
    font-size: 13px;
    line-height: 1.25;
    color: var(--term-text);
    cursor: text;
  }

  .terminal-body::-webkit-scrollbar { width: 10px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 5px;
  }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.25em;
  }

  .prompt-line {
    display: flex;
    flex-wrap: wrap;
  }

  .ps-user { color: var(--term-green); font-weight: 700; }
  .ps-at { color: var(--term-text); }
  .ps-host { color: var(--term-green); font-weight: 700; }
  .ps-colon { color: var(--term-text); }
  .ps-path { color: var(--term-purple); font-weight: 700; }
  .ps-dollar { color: var(--term-text); margin-right: 7px; }

  .input-row {
    display: flex;
    align-items: center;
    flex: 1;
  }

  #cmdInput {
    background: transparent;
    border: none;
    outline: none;
    color: var(--term-text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.25;
    flex: 1;
    caret-color: transparent;
    min-width: 10px;
  }

  .fake-caret {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--term-cursor);
    vertical-align: middle;
    margin-left: -1px;
    animation: blink 1s step-end infinite;
    position: relative;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }

  .out-dir { color: var(--term-purple); font-weight: 700; }
  .out-exec { color: var(--term-green); font-weight: 700; }
  .out-file { color: var(--term-text); }
  .out-error { color: var(--term-red); }
  .out-success { color: var(--term-green); }
  .out-info { color: var(--term-cyan); }
  .out-dim { color: var(--term-dim); }
  .out-link { color: var(--term-cyan); text-decoration: underline; cursor: pointer; }

  a.out-link:hover { color: #8fe0f5; }

  /* ls grid */
  .ls-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2px 24px;
  }

  /* less / pager overlay */
  .pager-overlay {
    position: absolute;
    inset: 38px 0 0 0;
    background: var(--term-bg);
    display: none;
    flex-direction: column;
    z-index: 10;
  }
  .pager-overlay.active { display: flex; }
  .pager-content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.25;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .pager-content::-webkit-scrollbar { width: 10px; }
  .pager-content::-webkit-scrollbar-track { background: transparent; }
  .pager-content::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 5px;
  }
  .pager-statusbar {
    background: #4a2540;
    color: var(--term-text);
    font-size: 12px;
    padding: 2px 10px;
    flex-shrink: 0;
  }

  .boot-cursor-block {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--term-text);
  }

  /* mobile */
  @media (max-width: 640px) {
    .desktop { padding: 0; }
    .terminal-window {
      width: 100%;
      height: 100%;
      border-radius: 0;
    }
    .terminal-body { font-size: 12px; }
    .titlebar-title { font-size: 11px; }
  }

  .visually-hidden {
    position: absolute;
    left: -9999px;
  }
</style>
</head>
<body>

<div class="desktop">

</div>

<input type="text" id="hiddenInput" class="visually-hidden" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">

<script>
(function() {
  // ============================================================
  // EDITABLE CONTENT — replace these with your real info
  // ============================================================
  const PROFILE_TXT = `NAME:     Alex Rivera
ROLE:     Backend Engineer / Infrastructure
LOCATION: Berlin, Germany
EMAIL:    alex@example.com

Currently open to senior backend / platform roles.
Remote-friendly, open to relocation for the right team.

Run 'cat skills.txt' or 'ls projects/' to see more.`;

  const SKILLS_TXT = `LANGUAGES
---------
Go              [####################]  expert
Python          [################----]  advanced
TypeScript      [##############------]  advanced
Rust            [########------------]  intermediate
SQL             [##################--]  advanced

PRACTICES
---------

performance profiling, mentoring, technical writing`;

  const CONTACT_TXT = `Reach me here:

  Email     alex@example.com
  GitHub    github.com/alexrivera
  LinkedIn  linkedin.com/in/alexrivera

  Usually I reply within a day or two.`;

  const PROJECTS = [
    {
      name: "queueline",
      file: "queueline.txt",
      content: `queueline — distributed task queue
-----------------------------------
A Go-based task queue with at-least-once delivery,
priority lanes, and dead-letter handling. Built to
replace a flaky cron-based job runner at scale.

Stack:  Go, Redis, gRPC
Stars:  340+
Link:   github.com/alexrivera/queueline`
    },
    {
      name: "shoreline",
      file: "shoreline.txt",
      content: `shoreline — config drift detector
----------------------------------
Watches infra-as-code repos and live cloud state,
flags drift before it becomes an incident. Used
internally across 4 teams before open-sourcing.

Stack:  Python, Terraform, AWS API
Stars:  120+
Link:   github.com/alexrivera/shoreline`
    },
    {
      name: "tinycache",
      file: "tinycache.txt",
      content: `tinycache — minimal LRU cache library
---------------------------------------
A dependency-free LRU cache for Node/TS with TTL
support and pluggable eviction policies. Started
as a weekend project, now used in a few prod apps.

Stack:  TypeScript
Stars:  85+
Link:   github.com/alexrivera/tinycache`
    }
  ];
  // ============================================================
  // END EDITABLE CONTENT
  // ============================================================

  const HOSTNAME = "portfolio";
  const USERNAME = "guest";

  // Virtual filesystem
  const fs = {
    "~": {
      type: "dir",
      children: {
        "profile.txt": { type: "file", content: PROFILE_TXT },
        "skills.txt": { type: "file", content: SKILLS_TXT },
        "contact.txt": { type: "file", content: CONTACT_TXT },
        "projects": {
          type: "dir",
          children: {}
        }
      }
    }
  };
  PROJECTS.forEach(p => {
    fs["~"].children["projects"].children[p.file] = { type: "file", content: p.content };
  });

  let cwdPath = ["~"];
  let history = [];
  let historyIndex = -1;
  let currentInput = "";
  let pagerActive = false;
  let pagerLines = [];

  const output = document.getElementById("output");
  const termBody = document.getElementById("termBody");
  const typedText = document.getElementById("typedText");
  const psPath = document.getElementById("psPath");
  const hiddenInput = document.getElementById("hiddenInput");
  const pagerOverlay = document.getElementById("pagerOverlay");
  const pagerContent = document.getElementById("pagerContent");

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function resolveDir(path) {
    let node = fs["~"];
    for (let i = 1; i < path.length; i++) {
      node = node.children[path[i]];
    }
    return node;
  }

  function getNodeAt(targetPath) {
    // targetPath is an array like ["~","projects"]
    let node = fs["~"];
    for (let i = 1; i < targetPath.length; i++) {
      if (!node.children || !node.children[targetPath[i]]) return null;
      node = node.children[targetPath[i]];
    }
    return node;
  }

  function pathString(path) {
    if (path.length === 1) return "~";
    return "~/" + path.slice(1).join("/");
  }

  function printRaw(html) {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = html;
    output.appendChild(div);
  }

  function printText(text, cls) {
    const div = document.createElement("div");
    div.className = "line" + (cls ? " " + cls : "");
    div.textContent = text;
    output.appendChild(div);
  }

  function printEchoedPrompt(cmd) {
    const div = document.createElement("div");
    div.className = "line prompt-line";
    div.innerHTML = `<span class="ps-user">${USERNAME}</span><span class="ps-at">@</span><span class="ps-host">${HOSTNAME}</span><span class="ps-colon">:</span><span class="ps-path">${esc(pathString(cwdPath))}</span><span class="ps-dollar">$</span> ${esc(cmd)}`;
    output.appendChild(div);
  }

  function scrollToBottom() {
    termBody.scrollTop = termBody.scrollHeight;
  }

  function updatePrompt() {
    psPath.textContent = pathString(cwdPath);
  }

  // ---------- commands ----------

  const COMMANDS_LIST = ["help","ls","cat","less","cd","pwd","whoami","clear","neofetch","history","echo","date","open"];

  function cmdHelp() {
    printText("Available commands:");
    printRaw(`<span class="out-exec">help</span>      show this list`);
    printRaw(`<span class="out-exec">ls</span>        list files in current directory`);
    printRaw(`<span class="out-exec">cat</span>       &lt;file&gt;   print file contents`);
    printRaw(`<span class="out-exec">less</span>      &lt;file&gt;   open file in pager (q to quit)`);
    printRaw(`<span class="out-exec">cd</span>        &lt;dir&gt;    change directory`);
    printRaw(`<span class="out-exec">pwd</span>       print working directory`);
    printRaw(`<span class="out-exec">whoami</span>    print current user`);
    printRaw(`<span class="out-exec">neofetch</span>  show system / about info`);
    printRaw(`<span class="out-exec">history</span>   show command history`);
    printRaw(`<span class="out-exec">echo</span>      &lt;text&gt;   print text`);
    printRaw(`<span class="out-exec">date</span>      show current date/time`);
    printRaw(`<span class="out-exec">clear</span>     clear the screen`);
    printText("");
    printText("Tip: try 'cat profile.txt', 'less skills.txt', or 'ls projects/'");
  }

  function cmdLs(args) {
    let target = cwdPath;
    if (args.length > 0) {
      const argPath = resolvePath(args[0]);
      if (!argPath) {
        printRaw(`ls: cannot access '${esc(args[0])}': <span class="out-error">No such file or directory</span>`);
        return;
      }
      const node = getNodeAt(argPath);
      if (!node) {
        printRaw(`ls: cannot access '${esc(args[0])}': <span class="out-error">No such file or directory</span>`);
        return;
      }
      if (node.type === "file") {
        printText(args[0]);
        return;
      }
      target = argPath;
    }
    const dirNode = getNodeAt(target);
    const entries = Object.keys(dirNode.children).sort((a, b) => {
      const aIsDir = dirNode.children[a].type === "dir";
      const bIsDir = dirNode.children[b].type === "dir";
      if (aIsDir && !bIsDir) return -1;
      if (!aIsDir && bIsDir) return 1;
      return a.localeCompare(b);
    });
    if (entries.length === 0) {
      printText("(empty)");
      return;
    }
    const spans = entries.map(name => {
      const isDir = dirNode.children[name].type === "dir";
      const label = isDir ? name + "/" : name;
      const cls = isDir ? "out-dir" : "out-file";
      return `<span class="${cls}">${esc(label)}</span>`;
    });
    printRaw(`<div class="ls-grid">${spans.join("")}</div>`);
  }

  function resolvePath(arg) {
    // returns resolved path array or null
    if (!arg) return cwdPath.slice();
    let parts;
    let base;
    if (arg.startsWith("~")) {
      base = ["~"];
      parts = arg.slice(1).split("/").filter(p => p.length > 0);
    } else if (arg.startsWith("/")) {
      base = ["~"];
      parts = arg.split("/").filter(p => p.length > 0);
    } else {
      base = cwdPath.slice();
      parts = arg.split("/").filter(p => p.length > 0);
    }
    let path = base;
    for (const part of parts) {
      if (part === ".") continue;
      if (part === "..") {
        if (path.length > 1) path = path.slice(0, -1);
        continue;
      }
      path = path.concat([part]);
    }
    return path;
  }

  function cmdCd(args) {
    if (args.length === 0) {
      cwdPath = ["~"];
      updatePrompt();
      return;
    }
    const target = resolvePath(args[0]);
    const node = getNodeAt(target);
    if (!node) {
      printRaw(`bash: cd: ${esc(args[0])}: <span class="out-error">No such file or directory</span>`);
      return;
    }
    if (node.type !== "dir") {
      printRaw(`bash: cd: ${esc(args[0])}: <span class="out-error">Not a directory</span>`);
      return;
    }
    cwdPath = target;
    updatePrompt();
  }

  function findFile(arg) {
    const path = resolvePath(arg);
    const node = getNodeAt(path);
    return node;
  }

  function cmdCat(args) {
    if (args.length === 0) {
      printText("cat: missing file operand");
      return;
    }
    const node = findFile(args[0]);
    if (!node) {
      printRaw(`cat: ${esc(args[0])}: <span class="out-error">No such file or directory</span>`);
      return;
    }
    if (node.type === "dir") {
      printRaw(`cat: ${esc(args[0])}: <span class="out-error">Is a directory</span>`);
      return;
    }
    printText(node.content);
  }

  function cmdLess(args) {
    if (args.length === 0) {
      printText("less: missing file operand");
      return;
    }
    const node = findFile(args[0]);
    if (!node) {
      printRaw(`less: ${esc(args[0])}: <span class="out-error">No such file or directory</span>`);
      return;
    }
    if (node.type === "dir") {
      printRaw(`less: ${esc(args[0])}: <span class="out-error">Is a directory</span>`);
      return;
    }
    openPager(node.content);
  }

  function cmdPwd() {
    printText("/home/guest" + (cwdPath.length > 1 ? "/" + cwdPath.slice(1).join("/") : ""));
  }

  function cmdWhoami() {
    printText(USERNAME);
  }

  function cmdEcho(args) {
    printText(args.join(" "));
  }

  function cmdDate() {
    printText(new Date().toString());
  }

  function cmdHistory() {
    if (history.length === 0) {
      printText("(no history yet)");
      return;
    }
    history.forEach((h, i) => {
      printText(`  ${i + 1}  ${h}`);
    });
  }

  function cmdNeofetch() {
    const ascii = [
      "         _,met$$$$$gg.          ",
      "      ,g$$$$$$$$$$$$$$$P.       ",
      "    ,g$$P\"\"       \"\"\"Y$$.\".     ",
      "   ,$$P'              `$$$.     ",
      "  ',$$P       ,ggs.     `$$b:   ",
      "  `d$$'     ,$P\"'   .    $$$    ",
      "   $$P      d$'     ,    $$P    ",
      "   $$:      $$.   -    ,d$$'    ",
      "   $$;      Y$b._   _,d$P'      ",
      "   Y$$.    `.`\"Y$$$$P\"'         ",
      "   `$$b      \"-.__              ",
      "    `Y$$                        ",
      "     `Y$$.                      ",
      "       `$$b.                    ",
      "         `Y$$b.                 ",
      "            `\"Y$b._             ",
      "                `\"\"\"            "
    ];
    const info = [
      `${USERNAME}@${HOSTNAME}`,
      "-----------------",
      "OS: PortfolioOS 26.06 LTS",
      "Host: terminal-portfolio",
      "Kernel: 6.8.0-portfolio",
      "Shell: webshell 1.0",
      "Role: Backend Engineer",
      "Status: Open to opportunities",
      "Contact: cat contact.txt"
    ];
    const lines = Math.max(ascii.length, info.length);
    let block = "";
    for (let i = 0; i < lines; i++) {
      const left = ascii[i] || "".padEnd(33, " ");
      const right = info[i] || "";
      block += left.padEnd(33, " ") + "  " + right + "\n";
    }
    printRaw(`<span class="out-info">${esc(block)}</span>`);
  }

  function cmdOpen(args) {
    if (args.length === 0) {
      printText("open: missing argument. try: open github | linkedin | email");
      return;
    }
    const target = args[0].toLowerCase();
    const map = {
      github: "https://github.com/alexrivera",
      linkedin: "https://linkedin.com/in/alexrivera",
      email: "mailto:alex@example.com"
    };
    if (map[target]) {
      printText(`Opening ${target}...`);
      window.open(map[target], "_blank");
    } else {
      printText(`open: unknown target '${args[0]}'. try: github, linkedin, email`);
    }
  }

  function runCommand(raw) {
    const trimmed = raw.trim();
    if (trimmed.length === 0) return;

    history.push(trimmed);
    historyIndex = history.length;

    const parts = trimmed.split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    switch (cmd) {
      case "help":
        cmdHelp();
        break;
      case "ls":
        cmdLs(args);
        break;
      case "cat":
        cmdCat(args);
        break;
      case "less":
      case "more":
        cmdLess(args);
        break;
      case "cd":
        cmdCd(args);
        break;
      case "pwd":
        cmdPwd();
        break;
      case "whoami":
        cmdWhoami();
        break;
      case "clear":
        output.innerHTML = "";
        break;
      case "neofetch":
        cmdNeofetch();
        break;
      case "history":
        cmdHistory();
        break;
      case "echo":
        cmdEcho(args);
        break;
      case "date":
        cmdDate();
        break;
      case "open":
        cmdOpen(args);
        break;
      case "sudo":
        printRaw(`<span class="out-error">guest is not in the sudoers file. This incident will be reported.</span>`);
        break;
      case "exit":
      case "logout":
        printText("logout");
        printText("(there is no escape from the portfolio)");
        break;
      default:
        printRaw(`bash: ${esc(cmd)}: <span class="out-error">command not found</span>`);
        printText(`Type 'help' to see available commands.`);
    }
  }

  // ---------- pager (less) ----------

  function openPager(content) {
    pagerActive = true;
    pagerContent.textContent = content;
    pagerOverlay.classList.add("active");
    pagerContent.scrollTop = 0;
    pagerContent.focus();
  }

  function closePager() {
    pagerActive = false;
    pagerOverlay.classList.remove("active");
    focusInput();
  }

  // ---------- input handling ----------

  function renderTyped() {
    typedText.textContent = currentInput;
  }

  function focusInput() {
    hiddenInput.focus();
  }

  function submitLine() {
    const cmdStr = currentInput;
    printEchoedPrompt(cmdStr);
    currentInput = "";
    renderTyped();
    if (cmdStr.trim().length > 0) {
      runCommand(cmdStr);
    }
    scrollToBottom();
  }

  // ---------- tab completion (bash-like) ----------

  let lastTabInput = null;
  let lastTabMatches = [];

  function commonPrefix(strings) {
    if (strings.length === 0) return "";
    let prefix = strings[0];
    for (let i = 1; i < strings.length; i++) {
      while (!strings[i].startsWith(prefix)) {
        prefix = prefix.slice(0, -1);
        if (prefix === "") return "";
      }
    }
    return prefix;
  }

  function handleTabComplete() {
    // split into words, keep track of the leading part and the word being completed
    const lastSpaceIdx = currentInput.lastIndexOf(" ");
    const head = lastSpaceIdx === -1 ? "" : currentInput.slice(0, lastSpaceIdx + 1);
    const word = lastSpaceIdx === -1 ? currentInput : currentInput.slice(lastSpaceIdx + 1);
    const isFirstWord = lastSpaceIdx === -1;

    let candidates = [];
    let isDirCandidate = {};

    if (isFirstWord) {
      candidates = COMMANDS_LIST.filter(c => c.startsWith(word));
    } else {
      // complete against files/dirs in current directory
      const dirNode = getNodeAt(cwdPath);
      if (dirNode && dirNode.children) {
        const names = Object.keys(dirNode.children);
        candidates = names.filter(n => n.startsWith(word));
        names.forEach(n => {
          isDirCandidate[n] = dirNode.children[n].type === "dir";
        });
      }
    }

    if (candidates.length === 0) {
      return;
    }

    if (candidates.length === 1) {
      const match = candidates[0];
      const suffix = isFirstWord ? " " : (isDirCandidate[match] ? "/" : " ");
      currentInput = head + match + suffix;
      renderTyped();
      lastTabInput = null;
      lastTabMatches = [];
      return;
    }

    // multiple matches: complete as far as the common prefix allows
    const prefix = commonPrefix(candidates);
    if (prefix.length > word.length) {
      currentInput = head + prefix;
      renderTyped();
      lastTabInput = null;
      lastTabMatches = [];
      return;
    }

    // no further unambiguous completion possible:
    // on a second consecutive Tab press with the same input, list options (real bash behavior)
    if (lastTabInput === currentInput) {
      printEchoedPrompt(currentInput);
      const spans = candidates.sort().map(name => {
        const cls = isFirstWord ? "out-exec" : (isDirCandidate[name] ? "out-dir" : "out-file");
        const label = (!isFirstWord && isDirCandidate[name]) ? name + "/" : name;
        return `<span class="${cls}">${esc(label)}</span>`;
      });
      printRaw(`<div class="ls-grid">${spans.join("")}</div>`);
      scrollToBottom();
      lastTabInput = null;
      lastTabMatches = [];
    } else {
      lastTabInput = currentInput;
      lastTabMatches = candidates;
    }
  }

  hiddenInput.addEventListener("keydown", function(e) {
    if (pagerActive) {
      if (e.key === "q" || e.key === "Escape") {
        closePager();
      } else if (e.key === "ArrowDown" || e.key === "j") {
        pagerContent.scrollTop += 24;
      } else if (e.key === "ArrowUp" || e.key === "k") {
        pagerContent.scrollTop -= 24;
      } else if (e.key === " " || e.key === "PageDown") {
        pagerContent.scrollTop += pagerContent.clientHeight * 0.9;
      } else if (e.key === "b" || e.key === "PageUp") {
        pagerContent.scrollTop -= pagerContent.clientHeight * 0.9;
      }
      e.preventDefault();
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      submitLine();
    } else if (e.key === "Backspace") {
      e.preventDefault();
      currentInput = currentInput.slice(0, -1);
      renderTyped();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (history.length > 0) {
        historyIndex = Math.max(0, historyIndex - 1);
        currentInput = history[historyIndex] || "";
        renderTyped();
      }
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      if (history.length > 0) {
        historyIndex = Math.min(history.length, historyIndex + 1);
        currentInput = history[historyIndex] || "";
        renderTyped();
      }
    } else if (e.key === "Tab") {
      e.preventDefault();
      handleTabComplete();
    } else if (e.key === "l" && (e.ctrlKey)) {
      e.preventDefault();
      output.innerHTML = "";
    } else if (e.key === "c" && (e.ctrlKey)) {
      e.preventDefault();
      printRaw(`<span class="prompt-line"><span class="ps-user">${USERNAME}</span><span class="ps-at">@</span><span class="ps-host">${HOSTNAME}</span><span class="ps-colon">:</span><span class="ps-path">${esc(pathString(cwdPath))}</span><span class="ps-dollar">$</span> ${esc(currentInput)}^C</span>`);
      currentInput = "";
      renderTyped();
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      currentInput += e.key;
      renderTyped();
    }
  });

  // catch paste
  hiddenInput.addEventListener("input", function() {
    // handled via keydown for most cases; this covers IME/paste edge cases
  });

  termBody.addEventListener("click", focusInput);
  pagerOverlay.addEventListener("click", () => pagerContent.focus());
  document.addEventListener("click", function(e) {
    if (!pagerActive) focusInput();
  });

  // ---------- boot sequence ----------

  function bootSequence() {
    const lines = [
      { text: "Welcome to PortfolioOS 26.06 LTS (GNU/Linux 6.8.0-portfolio x86_64)", delay: 0 },
      { text: "", delay: 80 },
      { text: "Last login: " + new Date().toDateString() + " from 127.0.0.1", delay: 80 },
      { text: "", delay: 120 },
    ];
    let i = 0;
    function step() {
      if (i >= lines.length) {
        printText("Type 'help' to see available commands, or 'neofetch' for an overview.");
        printText("");
        focusInput();
        scrollToBottom();
        return;
      }
      printText(lines[i].text, "out-dim");
      i++;
      setTimeout(step, lines[i - 1] ? lines[i-1].delay : 0);
    }
    step();
  }

  updatePrompt();
  bootSequence();
})();
</script>
